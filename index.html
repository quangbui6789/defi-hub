<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Arc DEX DeFi Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
</head>
<body>

    <h2>Arc DEX DeFi Hub - Testnet</h2>
    <button id="connectButton">Kết nối ví</button>
    <button id="tradeButton">Thực hiện lệnh (Ký & Tính Gas)</button>

    <script>
        let provider;
        let signer;

        // Cấu hình mạng Arc Testnet chuẩn
        const ARC_TESTNET_PARAMS = {
            chainId: "0x4CECE6", // 5042002 chuyển sang dạng Hex
            chainName: "Arc Testnet",
            rpcUrls: ["https://arc-testnet.drpc.org"], 
            nativeCurrency: {
                name: "USD Coin",
                symbol: "USDC", // Mạng Arc dùng USDC làm phí gas
                decimals: 18
            },
            blockExplorerUrls: ["https://testnet.arcscan.io"]
        };

        // Hàm kết nối ví và tự động chuyển sang mạng Arc Testnet
        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    // Yêu cầu kết nối tài khoản
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    provider = new ethers.BrowserProvider(window.ethereum);
                    signer = await provider.getSigner();
                    
                    // Kiểm tra và ép ví chuyển sang Arc Testnet để tính gas đúng chuẩn
                    try {
                        await window.ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: ARC_TESTNET_PARAMS.chainId }],
                        });
                    } catch (switchError) {
                        // Nếu ví chưa có mạng Arc Testnet, tự động thêm vào ví
                        if (switchError.code === 4902) {
                            await window.ethereum.request({
                                method: 'wallet_addEthereumChain',
                                params: [ARC_TESTNET_PARAMS],
                            });
                        }
                    }
                    
                    document.getElementById('connectButton').innerText = "Đã kết nối";
                    alert("Kết nối ví và cấu hình mạng Arc thành công!");
                } catch (error) {
                    console.error("Lỗi kết nối:", error);
                }
            } else {
                alert("Vui lòng cài đặt MetaMask hoặc một ví Web3 để thao tác!");
            }
        }

        // Hàm xử lý lệnh: Kích hoạt Pop-up ký và tính phí Gas
        async function executeOrder() {
            if (!signer) {
                alert("Vui lòng bấm 'Kết nối ví' trước!");
                return;
            }

            try {
                // Thay thế bằng thông tin Smart Contract Testnet của bạn trên Arc
                const contractAddress = "0xĐịa_Chỉ_Smart_Contract_Của_Bạn"; 
                const contractABI = [
                    "function swap(uint256 amountIn, uint256 amountOutMin) external" // Thay hàm thực tế của bạn vào đây
                ];

                const contract = new ethers.Contract(contractAddress, contractABI, signer);

                // Ước tính Gas limit cho lệnh
                const amountIn = ethers.parseUnits("1", 18);
                const amountOutMin = ethers.parseUnits("0.9", 18);
                
                // Thử ước lượng gas, nếu lỗi set cứng hạn mức phòng hờ để ví vẫn pop-up
                let gasLimit;
                try {
                    gasLimit = await contract.swap.estimateGas(amountIn, amountOutMin);
                } catch (e) {
                    gasLimit = 300000n; 
                }

                // Cấu hình Gas tối thiểu bắt buộc của Arc Testnet (Sàn 20 Gwei)
                const txOptions = {
                    gasLimit: gasLimit,
                    maxFeePerGas: ethers.parseUnits("20", "gwei"), // Bắt buộc để hiện phí gas dạng USDC
                    maxPriorityFeePerGas: ethers.parseUnits("2", "gwei")
                };

                alert("Cửa sổ ký lệnh của Ví sắp xuất hiện. Hãy kiểm tra phí gas USDC hiển thị trên ví!");

                // Thực thi lệnh -> Đoạn này kích hoạt Pop-up MetaMask/Rabby để user ký lệnh
                const tx = await contract.swap(amountIn, amountOutMin, txOptions);
                console.log("Giao dịch đã gửi, Hash:", tx.hash);
                
                // Chờ blockchain xác nhận
                await tx.wait();
                alert("Giao dịch thành công trên Arc Testnet!");

            } catch (error) {
                console.error("Lỗi thực thi lệnh:", error);
                alert("Giao dịch thất bại hoặc bị từ chối ký.");
            }
        }

        // Gắn sự kiện vào các nút bấm trên giao diện web của bạn
        document.getElementById('connectButton').addEventListener('click', connectWallet);
        document.getElementById('tradeButton').addEventListener('click', executeOrder);
    </script>
</body>
</html>
