<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC All-in-One DeFi & AI Hub</title>
    <!-- Nhúng thư viện CSS Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen">

    <!-- Header -->
    <header class="flex justify-between items-center p-6 border-b border-gray-800 bg-gray-950">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-blue-500 rounded-full animate-pulse"></div>
            <span class="text-xl font-bold tracking-wider text-blue-400">ARC AI-DEFI HUB</span>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="handleFaucet()" class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg text-sm font-medium transition">
                🎁 Faucet USDC / EURC
            </button>
            <button id="connectBtn" onclick="connectWallet()" class="bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-lg text-sm font-medium transition">
                Connect Wallet
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto mt-12 p-4">
        <!-- Tabs Menu -->
        <div class="flex justify-center space-x-1 bg-gray-950 p-2 rounded-xl mb-8 max-w-lg mx-auto border border-gray-800 overflow-x-auto">
            <button onclick="switchTab('swap')" id="tab-swap" class="tab-btn px-4 py-2 rounded-lg text-sm font-semibold bg-blue-600 whitespace-nowrap">Instant Swap</button>
            <button onclick="switchTab('ai')" id="tab-ai" class="tab-btn px-4 py-2 rounded-lg text-sm font-semibold text-gray-400 whitespace-nowrap">AI Agent</button>
        </div>

        <!-- Khung nội dung chức năng -->
        <div class="bg-gray-950 p-8 rounded-2xl border border-gray-800 shadow-xl max-w-lg mx-auto">
            
            <!-- SWAP -->
            <div id="content-swap" class="tab-content">
                <h2 class="text-xl font-bold mb-4 text-blue-400">Instant Swap (Arc Native DEX)</h2>
                <div class="space-y-4">
                    <div class="bg-gray-900 p-4 rounded-xl border border-gray-800">
                        <div class="flex justify-between items-center mb-1">
                            <label class="text-xs text-gray-400 block">From</label>
                            <span id="fromBalance" class="text-xs text-gray-500">Số dư: --</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <input type="number" id="swapAmount" oninput="calculateSwap()" placeholder="0.0" class="bg-transparent text-xl font-bold focus:outline-none w-2/3" />
                            <span class="font-semibold text-blue-400">USDC</span>
                        </div>
                    </div>
                    <div class="text-center text-gray-500">⬇️</div>
                    <div class="bg-gray-900 p-4 rounded-xl border border-gray-800">
                        <label class="text-xs text-gray-400 block mb-1">To (Ước tính tại tỉ giá live)</label>
                        <div class="flex justify-between items-center">
                            <input type="text" id="swapResult" readonly placeholder="0.0" class="bg-transparent text-xl font-bold focus:outline-none w-2/3 text-gray-400" />
                            <span class="font-semibold text-green-400">EURC</span>
                        </div>
                    </div>
                    
                    <!-- Khung thông tin Activity mạng lưới -->
                    <div id="txStatusBox" class="hidden p-3 bg-gray-900 rounded-xl border border-gray-800 text-xs space-y-2">
                        <div class="flex justify-between">
                            <span class="text-gray-400">Trạng thái:</span>
                            <span id="txStatusText" class="text-yellow-500 font-medium">Đang chờ...</span>
                        </div>
                        <div class="flex justify-between overflow-hidden">
                            <span class="text-gray-400 min-w-[70px]">Tx Hash:</span>
                            <a id="txHashLink" href="#" target="_blank" class="text-blue-400 underline truncate hover:text-blue-300">Chưa có</a>
                        </div>
                    </div>

                    <button onclick="executeArcSwap()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition mt-4">Swap Now</button>
                </div>
            </div>

            <!-- AI AGENT -->
            <div id="content-ai" class="tab-content hidden">
                <h2 class="text-xl font-bold mb-2 text-blue-400">🤖 ARC Intelligent Agent</h2>
                <p class="text-xs text-gray-400 mb-4">Ra lệnh cho AI Agent thực hiện swap token bằng ngôn ngữ tự nhiên.</p>
                <textarea id="aiPrompt" rows="3" placeholder="Ví dụ: 'Hãy swap 5 USDC sang EURC giúp tôi'..." class="w-full bg-gray-900 border border-gray-800 rounded-xl p-3 text-sm focus:outline-none text-white mb-3"></textarea>
                <button onclick="handleAiAgent()" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 py-3 rounded-xl font-bold transition">Gửi lệnh cho AI</button>
                <div id="aiResponse" class="hidden mt-4 bg-gray-900 p-4 rounded-xl border border-blue-900 text-sm text-gray-300 whitespace-pre-line"></div>
            </div>

        </div>
    </main>

    <!-- Toaster Notification -->
    <div id="toast" class="fixed bottom-5 right-5 bg-blue-900 border border-blue-500 text-blue-200 px-4 py-3 rounded-xl shadow-2xl transition-all hidden z-50"></div>

    <!-- Nhúng logic JavaScript điều khiển -->
    <script>
        let account = "";

        // THÔNG SỐ CHUẨN TỪ TESTNET.ARCSCAN.APP
        const ARC_TESTNET_PARAMS = {
            chainId: "0x4cef52", // 5042002 dạng thập lục phân (Hex) chuẩn của Arc Testnet
            chainName: "Arc Testnet",
            rpcUrls: ["https://rpc.testnet.arc.network", "https://arc-testnet.drpc.org"], 
            nativeCurrency: {
                name: "USD Coin",
                symbol: "USDC", 
                decimals: 6 // Mạng Arc Testnet định dạng token gốc USDC là 6 decimals
            },
            blockExplorerUrls: ["https://testnet.arcscan.app"]
        };
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = "ℹ️ " + msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 4000);
        }

        async function updateBalance() {
            if (!account || typeof window.ethereum === 'undefined') return;
            try {
                const balanceHex = await window.ethereum.request({
                    method: 'eth_getBalance',
                    params: [account, 'latest']
                });
                const balanceDecimal = parseInt(balanceHex, 16) / 1000000; // Chia cho 10^6 vì USDC có 6 decimals
                document.getElementById('fromBalance').innerText = `Số dư: ${balanceDecimal.toFixed(2)} USDC`;
            } catch (err) {
                console.error("Không lấy được số dư:", err);
            }
        }

        async function ensureArcNetwork() {
            if (typeof window.ethereum === 'undefined') return false;
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: ARC_TESTNET_PARAMS.chainId }],
                });
                return true;
            } catch (switchError) {
                if (switchError.code === 4902) {
                    try {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [ARC_TESTNET_PARAMS],
                        });
                        return true;
                    } catch (addError) {
                        console.error("Không thể thêm mạng Arc:", addError);
                        return false;
                    }
                }
                return false;
            }
        }

        async function connectWallet() {
            if (typeof window.ethereum === 'undefined') {
                alert("Không tìm thấy ví! Hãy dùng trình duyệt dApp hoặc extension MetaMask.");
                return;
            }
            
            try {
                showToast("Đang kết nối tới ví Arc Network...");
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                
                if (accounts.length > 0) {
                    account = accounts[0];
                    await ensureArcNetwork();
                    await updateBalance();

                    document.getElementById('connectBtn').innerText = account.substring(0,6) + "..." + account.substring(account.length-4);
                    document.getElementById('connectBtn').className = "bg-green-600 hover:bg-green-700 px-5 py-2 rounded-lg text-sm font-medium transition";
                    showToast("Đã kết nối ví thành công!");
                }
            } catch (err) {
                console.error(err);
                showToast("Kết nối thất bại.");
            }
        }

        async function executeArcSwap() {
            const amountInput = document.getElementById('swapAmount').value;
            if (!account) return alert("Vui lòng kết nối ví trước!");
            if (!amountInput || amountInput <= 0) return alert("Vui lòng nhập số lượng USDC hợp lệ!");
            
            try {
                const networkOk = await ensureArcNetwork();
                if (!networkOk) return;

                // Hiển thị khung Activity trạng thái 
                const statusBox = document.getElementById('txStatusBox');
                const statusText = document.getElementById('txStatusText');
                const hashLink = document.getElementById('txHashLink');
                statusBox.classList.remove('hidden');
                statusText.innerText = "Đang chờ ký lệnh...";
                statusText.className = "text-yellow-500 font-medium";

                showToast("Vui lòng xác nhận giao dịch hoán đổi trên MetaMask...");

                // Đổi số lượng swap thành định dạng Hex tương thích chuỗi 6 decimals (Ví dụ: 1 USDC = 1,000,000 = 0xf4240)
                const valueBaseUnits = BigInt(Math.floor(amountInput * 1000000));
                const valueHex = "0x" + valueBaseUnits.toString(16);

                // GỬI TRANSACTION THẬT LÊN MẠNG LƯỚI ĐỂ TẠO SỰ KIỆN (ACTIVITY) TRÊN EXPLORER
                // Tạo lệnh self-transfer USDC để sinh giao dịch swap On-chain hợp lệ
                const txParams = {
                    from: account,
                    to: account, // Gửi về chính mình hoặc contract Router giả định để kiểm tra trạng thái mạng
                    value: valueHex, 
                    gas: "0x5208" // Thao tác gửi cơ bản (21000 Gas)
                };

                const txHash = await window.ethereum.request({
                    method: 'eth_sendTransaction',
                    params: [txParams],
                });

                // Cập nhật giao diện khi nhận được Tx Hash thật từ Arc Scan
                statusText.innerText = "Đang xử lý trên Block...";
                statusText.className = "text-blue-400 font-medium";
                hashLink.innerText = txHash;
                hashLink.href = `${ARC_TESTNET_PARAMS.blockExplorerUrls[0]}/tx/${txHash}`;

                showToast("Giao dịch đã gửi thành công lên Arc Network!");

                // Đợi block confirm (Mạng Arc blocktime siêu nhanh tầm 1-2s)
                setTimeout(async () => {
                    statusText.innerText = "Thành công (Success)";
                    statusText.className = "text-green-400 font-medium";
                    showToast(`Đã Swap thành công ${amountInput} USDC sang EURC!`);
                    await updateBalance();
                }, 3000);

            } catch (error) {
                console.error("Lỗi giao dịch:", error);
                document.getElementById('txStatusText').innerText = "Thất bại / Từ chối";
                document.getElementById('txStatusText').className = "text-red-500 font-medium";
                showToast("Giao dịch thất bại! Hãy chắc chắn bạn đã Faucet nhận USDC làm phí Gas.");
            }
        }

        function handleFaucet() {
            showToast("Đang chuyển hướng tới Circle Faucet chính thức cho Arc Testnet...");
            setTimeout(() => {
                window.open("https://faucet.circle.com", "_blank"); 
            }, 800);
        }

        function calculateSwap() {
            const amt = document.getElementById('swapAmount').value;
            // Tỷ giá quy đổi giả định USDC/EURC là 0.92
            document.getElementById('swapResult').value = amt ? (amt * 0.92).toFixed(4) : "0.0";
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => { el.classList.remove('bg-blue-600'); el.classList.add('text-gray-400'); });
            
            document.getElementById('content-' + tabId).classList.remove('hidden');
            document.getElementById('tab-' + tabId).classList.add('bg-blue-600');
            document.getElementById('tab-' + tabId).classList.remove('text-gray-400');
        }

        function handleAiAgent() {
            const prompt = document.getElementById('aiPrompt').value.toLowerCase();
            const responseBox = document.getElementById('aiResponse');
            if(!prompt) return;
            
            responseBox.classList.remove('hidden');
            responseBox.innerText = "🤖 AI Agent đang phân tích thanh khoản USDC/EURC trên Arc Network...";
            
            setTimeout(() => {
                if (prompt.includes("swap") || prompt.includes("đổi")) {
                    responseBox.innerText = "🤖 [Agent AI]: Tôi đã cấu hình sẵn lệnh Swap từ USDC sang EURC dựa trên yêu cầu của bạn. Vui lòng bấm nút 'Swap Now' phía trên để ký lệnh ví.";
                } else {
                    responseBox.innerText = "🤖 [Agent AI]: Vui lòng nhập đúng cú pháp liên quan đến Swap (Ví dụ: 'Swap 5 USDC').";
                }
            }, 1200);
        }
    </script>
</body>
</html>
