<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC AI-DEFI HUB (REAL ON-CHAIN)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.11.1/ethers.umd.min.js"></script>
    <style>
        :root {
            --bg-color: #0b111e;
            --card-bg: #111827;
            --primary-color: #1d4ed8;
            --primary-hover: #2563eb;
            --text-color: #ffffff;
            --text-muted: #9ca3af;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid #1f2937;
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #3b82f6;
        }
        .wallet-zone {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-connect {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-disconnect {
            background-color: var(--danger);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .tab-btn {
            background-color: #1f2937;
            color: var(--text-muted);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .input-group {
            margin-bottom: 15px;
            position: relative;
        }
        .input-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            color: var(--text-muted);
            font-size: 14px;
        }
        .balance-label {
            color: #3b82f6;
            font-weight: 500;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #374151;
            background-color: #1f2937;
            color: white;
            box-sizing: border-box;
        }
        .btn-action {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-action:hover {
            background-color: var(--primary-hover);
        }
        .status-box {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            background-color: #1f2937;
            font-size: 13px;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">ARC AI-DEFI HUB (REAL ON-CHAIN)</div>
        <div class="wallet-zone">
            <button class="btn-connect" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
            <button class="btn-disconnect" id="disconnectBtn" onclick="disconnectWallet()">Disconnect</button>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('swap-tab')">Swap</button>
        <button class="tab-btn" onclick="switchTab('liquidity-tab')">Liquidity</button>
        <button class="tab-btn" onclick="switchTab('lending-tab')">Lending</button>
        <button class="tab-btn" onclick="switchTab('borrow-tab')">Borrow</button>
        <button class="tab-btn" onclick="switchTab('bridge-tab')">Bridge</button>
    </div>

    <div class="container">
        <div id="swap-tab" class="tab-content active">
            <h3>Swap Token</h3>
            <div class="input-group">
                <label>Từ Token</label>
                <select id="swapFromToken" onchange="updateAllBalances()">
                    <option value="USDC">USDC</option>
                    <option value="EURC">EURC</option>
                </select>
            </div>
            <div class="input-group">
                <label>
                    <span>Số lượng bán</span>
                    <span class="balance-label">Ví: <span id="balance-swap">0.0</span></span>
                </label>
                <input type="number" id="swapAmountIn" placeholder="0.0">
            </div>
            <div class="input-group">
                <label>Đến Token</label>
                <select id="swapToToken">
                    <option value="EURC">EURC</option>
                    <option value="USDC">USDC</option>
                </select>
            </div>
            <button class="btn-action" onclick="uiSwap()">Xác Nhận Swap</button>
        </div>

        <div id="liquidity-tab" class="tab-content">
            <h3>Liquidity Pool</h3>
            <div class="input-group">
                <label>
                    <span>Số lượng USDC nạp vào Pool</span>
                    <span class="balance-label">Ví: <span id="balance-liq-usdc">0.0</span></span>
                </label>
                <input type="number" id="liquidityUsdcAmount" placeholder="0.0">
            </div>
            <div class="input-group">
                <label>
                    <span>Số lượng EURC nạp vào Pool</span>
                    <span class="balance-label">Ví: <span id="balance-liq-eurc">0.0</span></span>
                </label>
                <input type="number" id="liquidityEurcAmount" placeholder="0.0">
            </div>
            <button class="btn-action" onclick="uiAddLiquidity()">Thêm Thanh Khoản</button>
        </div>

        <div id="lending-tab" class="tab-content">
            <h3>Lending Pool (Gửi Tài Sản)</h3>
            <div class="input-group">
                <label>Chọn tài sản muốn Lending</label>
                <select id="lendingToken" onchange="updateAllBalances()">
                    <option value="USDC">USDC</option>
                    <option value="EURC">EURC</option>
                </select>
            </div>
            <div class="input-group">
                <label>
                    <span>Số lượng muốn gửi</span>
                    <span class="balance-label">Ví: <span id="balance-lending">0.0</span></span>
                </label>
                <input type="number" id="lendingAmount" placeholder="0.0">
            </div>
            <button class="btn-action" onclick="uiLending()">Xác Nhận Lending</button>
        </div>

        <div id="borrow-tab" class="tab-content">
            <h3>Borrow (Vay Tài Sản)</h3>
            <div class="input-group">
                <label>Chọn tài sản muốn vay</label>
                <select id="borrowToken" onchange="updateAllBalances()">
                    <option value="USDC">USDC</option>
                    <option value="EURC">EURC</option>
                </select>
            </div>
            <div class="input-group">
                <label>
                    <span>Số lượng muốn vay</span>
                    <span class="balance-label">Ví: <span id="balance-borrow">0.0</span></span>
                </label>
                <input type="number" id="borrowAmount" placeholder="0.0">
            </div>
            <button class="btn-action" onclick="uiBorrow()">Xác Nhận Vay</button>
        </div>

        <div id="bridge-tab" class="tab-content">
            <h3>Cross-Chain Bridge (Từ Arc Chain)</h3>
            <div class="input-group">
                <label>Chuỗi đích chuyển đến</label>
                <select id="bridgeTargetChain">
                    <option value="Sepolia">Sepolia Testnet</option>
                    <option value="Base">Base Mainnet/Testnet</option>
                </select>
            </div>
            <div class="input-group">
                <label>Chọn Token muốn cầu</label>
                <select id="bridgeToken" onchange="updateAllBalances()">
                    <option value="USDC">USDC</option>
                    <option value="EURC">EURC</option>
                </select>
            </div>
            <div class="input-group">
                <label>
                    <span>Số lượng gửi qua cầu</span>
                    <span class="balance-label">Ví: <span id="balance-bridge">0.0</span></span>
                </label>
                <input type="number" id="bridgeAmount" placeholder="0.0">
            </div>
            <div class="input-group">
                <label>Địa chỉ ví nhận ở Chain đích</label>
                <input type="text" id="bridgeRecipient" placeholder="0x...">
            </div>
            <button class="btn-action" onclick="uiBridge()">Kích Hoạt Cầu Nối</button>
        </div>

        <div class="status-box" id="statusConsole">Trạng thái hệ thống: Sẵn sàng kết nối ví.</div>
    </div>

    <script>
        // Cấu hình các địa chỉ Smart Contract thực tế của bạn trên Arc Chain tại đây
        const DEPLOYED_CONTRACTS = {
            USDC_TOKEN: "0x0000000000000000000000000000000000000001", 
            EURC_TOKEN: "0x0000000000000000000000000000000000000002", 
            SWAP_POOL: "0x0000000000000000000000000000000000000003",  
            LENDING_POOL: "0x0000000000000000000000000000000000000004", 
            BRIDGE_CONTRACT: "0x0000000000000000000000000000000000000005" 
        };

        // Các cấu trúc ABI tối giản tương tác trực tiếp qua Ethers
        const ERC20_ABI = [
            "function approve(address spender, uint256 amount) public returns (bool)",
            "function balanceOf(address account) public view returns (uint256)"
        ];

        const SWAP_POOL_ABI = [
            "function swap(address fromToken, address toToken, uint256 amountIn) external",
            "function addLiquidity(uint256 amountUSDC, uint256 amountEURC) external returns (uint256 liquidity)"
        ];

        const LENDING_POOL_ABI = [
            "function deposit(address token, uint256 amount) external",
            "function borrow(address token, uint256 amount) external"
        ];

        const BRIDGE_ABI = [
            "function bridgeAsset(uint256 targetChainId, address token, uint256 amount, address recipient) external payable"
        ];

        let userAddress = null;

        function updateLog(msg) {
            document.getElementById('statusConsole').innerText = "Log: " + msg;
            console.log(msg);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        // --- HÀM LẤY SỐ DƯ (BALANCE) ---
        async function getTokenBalance(tokenAddress, account) {
            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const contract = new ethers.Contract(tokenAddress, ERC20_ABI, provider);
                const balance = await contract.balanceOf(account);
                return ethers.formatUnits(balance, 6); // Đổi định dạng hiển thị (giả định 6 decimals)
            } catch (err) {
                console.error("Lỗi lấy số dư token:", err);
                return "0.0";
            }
        }

        // --- CẬP NHẬT TẤT CẢ SỐ DƯ LÊN UI ---
        async function updateAllBalances() {
            if (!userAddress) return;

            // 1. Cập nhật Số dư cho Tab Swap dựa vào Token đang chọn
            const swapFrom = document.getElementById('swapFromToken').value;
            const swapTokenAddress = swapFrom === "USDC" ? DEPLOYED_CONTRACTS.USDC_TOKEN : DEPLOYED_CONTRACTS.EURC_TOKEN;
            document.getElementById('balance-swap').innerText = await getTokenBalance(swapTokenAddress, userAddress);

            // 2. Cập nhật số dư cho Tab Liquidity (Hiển thị cả 2)
            document.getElementById('balance-liq-usdc').innerText = await getTokenBalance(DEPLOYED_CONTRACTS.USDC_TOKEN, userAddress);
            document.getElementById('balance-liq-eurc').innerText = await getTokenBalance(DEPLOYED_CONTRACTS.EURC_TOKEN, userAddress);

            // 3. Cập nhật số dư cho Tab Lending
            const lendToken = document.getElementById('lendingToken').value;
            const lendAddress = lendToken === "USDC" ? DEPLOYED_CONTRACTS.USDC_TOKEN : DEPLOYED_CONTRACTS.EURC_TOKEN;
            document.getElementById('balance-lending').innerText = await getTokenBalance(lendAddress, userAddress);

            // 4. Cập nhật số dư cho Tab Borrow
            const borrowToken = document.getElementById('borrowToken').value;
            const borrowAddress = borrowToken === "USDC" ? DEPLOYED_CONTRACTS.USDC_TOKEN : DEPLOYED_CONTRACTS.EURC_TOKEN;
            document.getElementById('balance-borrow').innerText = await getTokenBalance(borrowAddress, userAddress);

            // 5. Cập nhật số dư cho Tab Bridge
            const bridgeToken = document.getElementById('bridgeToken').value;
            const bridgeAddress = bridgeToken === "USDC" ? DEPLOYED_CONTRACTS.USDC_TOKEN : DEPLOYED_CONTRACTS.EURC_TOKEN;
            document.getElementById('balance-bridge').innerText = await getTokenBalance(bridgeAddress, userAddress);
        }

        // --- HÀM KẾT NỐI VÍ ---
        async function connectWallet() {
            if (!window.ethereum) return alert("Vui lòng cài đặt MetaMask!");
            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("
