<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC AI-DEFI HUB (REAL ON-CHAIN)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.11.1/ethers.umd.min.js"></script>
    <style>
        :root {
            --bg-color: #0b111e;
            --card-bg: #111827;
            --primary-color: #1d4ed8;
            --primary-hover: #2563eb;
            --text-color: #ffffff;
            --text-muted: #9ca3af;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid #1f2937;
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #3b82f6;
        }
        .wallet-zone {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-connect {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-disconnect {
            background-color: var(--danger);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }
        .btn-faucet {
            background-color: #a855f7;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .tab-btn {
            background-color: #1f2937;
            color: var(--text-muted);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .input-group {
            margin-bottom: 15px;
            position: relative;
        }
        .input-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            color: var(--text-muted);
            font-size: 14px;
        }
        .balance-label {
            color: #3b82f6;
            font-weight: 500;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #374151;
            background-color: #1f2937;
            color: white;
            box-sizing: border-box;
        }
        .btn-action {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-action:hover {
            background-color: var(--primary-hover);
        }
        .status-box {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            background-color: #1f2937;
            font-size: 13px;
            word-break: break-all;
        }
        .pool-input {
            margin-top: 10px;
            border: 1px dashed #3b82f6 !important;
            background-color: #111827 !important;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">ARC AI-DEFI HUB (REAL ON-CHAIN)</div>
        <div class="wallet-zone">
            <button class="btn-faucet" onclick="window.open('https://testnet.arcscan.app', '_blank')">🎁 Faucet USDC / EURC</button>
            <button class="btn-connect" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
            <button class="btn-disconnect" id="disconnectBtn" onclick="disconnectWallet()">Disconnect</button>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'swap-tab')">Swap</button>
        <button class="tab-btn" onclick="switchTab(event, 'liquidity-tab')">Liquidity</button>
        <button class="tab-btn" onclick="switchTab(event, 'lending-tab')">Lending</button>
        <button class="tab-btn" onclick="switchTab(event, 'borrow-tab')">Borrow</button>
        <button class="tab-btn" onclick="switchTab(event, 'bridge-tab')">Bridge</button>
    </div>

    <div class="container">
        <div id="swap-tab" class="tab-content active">
            <h3>Swap Token</h3>
            <div class="input-group">
                <label>Từ Token</label>
                <select id="swapFromToken" onchange="updateAllBalances()">
                    <option value="USDC">USDC</option>
                    <option value="EURC">EURC</option>
                </select>
            </div>
            <div class="input-group">
                <label>
                    <span>Số lượng bán</span>
                    <span class="balance-label">Ví: <span id="balance-swap">0.0</span></span>
                </label>
                <input type="number" id="swapAmountIn" placeholder="0.0">
            </div>
            <div class="input-group">
                <label>Đến Token</label>
                <select id="swapToToken">
                    <option value="EURC">EURC</option>
                    <option value="USDC">USDC</option>
                </select>
            </div>
            <div class="input-group">
                <label style="color: #3b82f6; font-weight: bold;">Địa chỉ Smart Contract Swap Pool (Bắt buộc để trừ tiền)</label>
                <input type="text" id="swapPoolAddress" class="pool-input" placeholder="Nhập địa chỉ contract Pool đã deploy để thực thi lệnh Swap">
            </div>
            <button class="btn-action" onclick="uiSwap()">Xác Nhận Swap</button>
        </div>

        <div id="liquidity-tab" class="tab-content">
            <h3>Liquidity Pool</h3>
            <div class="input-group">
                <label>
                    <span>Số lượng USDC nạp vào Pool</span>
                    <span class="balance-label">Ví: <span id="balance-liq-usdc">0.0</span></span>
                </label>
                <input type="number" id="liquidityUsdcAmount" placeholder="0.0">
            </div>
            <div class="input-group">
                <label>
                    <span>Số lượng EURC nạp vào Pool</span>
                    <span class="balance-label">Ví: <span id="balance-liq-eurc">0.0</span></span>
                </label>
                <input type="number" id="liquidityEurcAmount" placeholder="0.0">
            </div>
            <div class="input-group">
                <label>Địa chỉ Smart Contract Liquidity Pool</label>
                <input type="text" id="liquidityPoolAddress" class="pool-input" placeholder="0x...">
            </div>
            <button class="btn-action" onclick="uiAddLiquidity()">Thêm Thanh Khoản</button>
        </div>

        <div id="lending-tab" class="tab-content">
            <h3>Lending Pool (Gửi Tài Sản)</h3>
            <div class="input-group">
                <label>Chọn tài sản muốn Lending</label>
                <select id="lendingToken" onchange="updateAllBalances()">
                    <option value="USDC">USDC</option>
                    <option value="EURC">EURC</option>
                </select>
            </div>
            <div class="input-group">
                <label>
                    <span>Số lượng muốn gửi</span>
                    <span class="balance-label">Ví: <span id="balance-lending">0.0</span></span>
                </label>
                <input type="number" id="lendingAmount" placeholder="0.0">
            </div>
            <div class="input-group">
                <label>Địa chỉ Smart Contract Lending Pool</label>
                <input type="text" id="lendingPoolAddress" class="pool-input" placeholder="0x...">
            </div>
            <button class="btn-action" onclick="uiLending()">Xác Nhận Lending</button>
        </div>

        <div id="borrow-tab" class="tab-content">
            <h3>Borrow (Vay Tài Sản)</h3>
            <div class="input-group">
                <label>Chọn tài sản muốn vay</label>
                <select id="borrowToken" onchange="updateAllBalances()">
                    <option value="USDC">USDC</option>
                    <option value="EURC">EURC</option>
                </select>
            </div>
            <div class="input-group">
                <label>
                    <span>Số lượng muốn vay</span>
                    <span class="balance-label">Ví: <span id="balance-borrow">0.0</span></span>
                </label>
                <input type="number" id="borrowAmount" placeholder="0.0">
            </div>
            <div class="input-group">
                <label>Địa chỉ Smart Contract Borrow Pool</label>
                <input type="text" id="borrowPoolAddress" class="pool-input" placeholder="0x...">
            </div>
            <button class="btn-action" onclick="uiBorrow()">Xác Nhận Vay</button>
        </div>

        <div id="bridge-tab" class="tab-content">
            <h3>Cross-Chain Bridge (Từ Arc Chain)</h3>
            <div class="input-group">
                <label>Chuỗi đích chuyển đến</label>
                <select id="bridgeTargetChain">
                    <option value="Sepolia">Sepolia Testnet</option>
                    <option value="Base">Base Mainnet/Testnet</option>
                </select>
            </div>
            <div class="input-group">
                <label>Chọn Token muốn cầu</label>
                <select id="bridgeToken" onchange="updateAllBalances()">
                    <option value="USDC">USDC</option>
                    <option value="EURC">EURC</option>
                </select>
            </div>
            <div class="input-group">
                <label>
                    <span>Số lượng gửi qua cầu</span>
                    <span class="balance-label">Ví: <span id="balance-bridge">0.0</span></span>
                </label>
                <input type="number" id="bridgeAmount" placeholder="0.0">
            </div>
            <div class="input-group">
                <label>Địa chỉ ví nhận ở Chain đích</label>
                <input type="text" id="bridgeRecipient" placeholder="0x...">
            </div>
            <div class="input-group">
                <label>Địa chỉ Smart Contract Bridge</label>
                <input type="text" id="bridgeContractAddress" class="pool-input" placeholder="0x...">
            </div>
            <button class="btn-action" onclick="uiBridge()">Kích Hoạt Cầu Nối</button>
        </div>

        <div class="status-box" id="statusConsole">Trạng thái hệ thống: Sẵn sàng kết nối ví.</div>
    </div>

    <script>
        // --- TÍCH HỢP TRỰC TIẾP CONTRACT CONTRACT TRÊN ARC TESTNET CỦA BẠN ---
        const DEPLOYED_CONTRACTS = {
            USDC_TOKEN: "0x3600000000000000000000000000000000000000", 
            EURC_TOKEN: "0x89B50B55Aa3bE2F677cD6303Cec089B5F319D72a"
        };

        const ERC20_ABI = [
            "function approve(address spender, uint256 amount) public returns (bool)",
            "function balanceOf(address account) public view returns (uint256)",
            "function decimals() public view returns (uint8)"
        ];

        const SWAP_POOL_ABI = [
            "function swap(address fromToken, address toToken, uint256 amountIn) external",
            "function addLiquidity(uint256 amountUSDC, uint256 amountEURC) external returns (uint256 liquidity)"
        ];

        const LENDING_POOL_ABI = [
            "function deposit(address token, uint256 amount) external",
            "function borrow(address token, uint256 amount) external"
        ];

        const BRIDGE_ABI = [
            "function bridgeAsset(uint256 targetChainId, address token, uint256 amount, address recipient) external payable"
        ];

        let userAddress = null;

        function updateLog(msg) {
            document.getElementById('statusConsole').innerText = "Log: " + msg;
            console.log(msg);
        }

        function switchTab(e, tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            e.currentTarget.classList.add('active');
        }

        // Đọc số dư on-chain và tự động lấy chuẩn decimals (6) của Arc Testnet
        async function getTokenBalance(tokenAddress, account) {
            try {
                if(!window.ethereum || !account) return "0.0";
                const provider = new ethers.BrowserProvider(window.ethereum);
                const contract = new ethers.Contract(tokenAddress, ERC20_ABI, provider);
                
                const [balance, decimals] = await Promise.all([
                    contract.balanceOf(account),
                    contract.decimals().catch(() => 6) 
                ]);
                
                return parseFloat(ethers.formatUnits(balance, decimals)).toFixed(4); 
            } catch (err) {
                console.warn("Lỗi kết nối on-chain:", err.message);
                return "0.0 (Error Contract)";
            }
        }

        async function updateAllBalances() {
            if (!userAddress) return;
            try {
                // 1. Tab Swap
                const swapFrom = document.getElementById('swapFromToken').value;
                const swapTokenAddress = swapFrom === "USDC" ? DEPLOYED_CONTRACTS.USDC_TOKEN : DEPLOYED_CONTRACTS.EURC_TOKEN;
                document.getElementById('balance-swap').innerText = await getTokenBalance(swapTokenAddress, userAddress);

                // 2. Tab Liquidity
                document.getElementById('balance-liq-usdc').innerText = await getTokenBalance(DEPLOYED_CONTRACTS.USDC_TOKEN, userAddress);
                document.getElementById('balance-liq-eurc').innerText = await getTokenBalance(DEPLOYED_CONTRACTS.EURC_TOKEN, userAddress);

                // 3. Tab Lending
                const lendToken = document.getElementById('lendingToken').value;
                const lendAddress = lendToken === "USDC" ? DEPLOYED_CONTRACTS.USDC_TOKEN : DEPLOYED_CONTRACTS.EURC_TOKEN;
                document.getElementById('balance-lending').innerText = await getTokenBalance(lendAddress, userAddress);

                // 4. Tab Borrow
                const borrowToken = document.getElementById('borrowToken').value;
                const borrowAddress = borrowToken === "USDC" ? DEPLOYED_CONTRACTS.USDC_TOKEN : DEPLOYED_CONTRACTS.EURC_TOKEN;
                document.getElementById('balance-borrow').innerText = await getTokenBalance(borrowAddress, userAddress);

                // 5. Tab Bridge
                const bridgeToken = document.getElementById('bridgeToken').value;
                const bridgeAddress = bridgeToken === "USDC" ? DEPLOYED_CONTRACTS.USDC_TOKEN : DEPLOYED_CONTRACTS.EURC_TOKEN;
                document.getElementById('balance-bridge').innerText = await getTokenBalance(bridgeAddress, userAddress);
            } catch (error) {
                console.error("Lỗi đồng bộ UI Balance:", error);
            }
        }

        async function connectWallet() {
            if (!window.ethereum) return alert("Vui lòng cài đặt MetaMask!");
            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                userAddress = accounts[0];
                
                document.getElementById('connectBtn').innerText = userAddress.substring(0, 6) + "..." + userAddress.substring(38);
                document.getElementById('connectBtn').style.backgroundColor = "#1e3a8a"; 
                document.getElementById('disconnectBtn').style.display = "inline-block"; 

                updateLog("Đã kết nối ví: " + userAddress);
                await updateAllBalances();
            } catch (err) {
                updateLog("Lỗi kết nối ví: " + err.message);
            }
        }

        function disconnectWallet() {
            userAddress = null;
            document.getElementById('connectBtn').innerText = "Connect Wallet";
            document.getElementById('connectBtn').style.backgroundColor = "var(--success)";
            document.getElementById('disconnectBtn').style.display = "none";
            
            document.getElementById('balance-swap').innerText = "0.0";
            document.getElementById('balance-liq-usdc').innerText = "0.0";
            document.getElementById('balance-liq-eurc').innerText = "0.0";
            document.getElementById('balance-lending').innerText = "0.0";
            document.getElementById('balance-borrow').innerText = "0.0";
            document.getElementById('balance-bridge').innerText = "0.0";
            updateLog("Đã ngắt kết nối ví.");
        }

        // --- CẬP NHẬT QUAN TRỌNG: HÀM SWAP BẮT LỖI REVERT VÀ CHỐNG TRÒN LỆNH ---
        async function uiSwap() {
            if (!userAddress) return alert("Vui lòng kết nối ví trước!");
            const fromSymbol = document.getElementById('swapFromToken').value;
            const toSymbol = document.getElementById('swapToToken').value;
            const amountIn = document.getElementById('swapAmountIn').value;
            
            // Ép buộc người dùng điền địa chỉ Swap Pool thực tế của họ vào ô nhập liệu
            const targetPool = document.getElementById('swapPoolAddress').value.trim();

            if (!targetPool || !targetPool.startsWith("0x") || targetPool.length !== 42) {
                updateLog("Lỗi hành động: Bạn chưa nhập địa chỉ Smart Contract Pool hoán đổi của mạng Arc!");
                return alert("Vui lòng dán địa chỉ Smart Contract Pool hoán đổi (Swap Pool) của bạn vào ô màu xanh bên dưới trước!");
            }

            if (fromSymbol === toSymbol) return alert("Mục Token nguồn và đích phải khác nhau!");
            if (!amountIn || amountIn <= 0) return alert("Vui lòng nhập số lượng hợp lệ!");

            const fromAddress = fromSymbol === "USDC" ? DEPLOYED_CONTRACTS.USDC_TOKEN : DEPLOYED_CONTRACTS.EURC_TOKEN;
            const toAddress = toSymbol === "USDC" ? DEPLOYED_CONTRACTS.USDC_TOKEN : DEPLOYED_CONTRACTS.EURC_TOKEN;

            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();

                const tokenInContract = new ethers.Contract(fromAddress, ERC20_ABI, signer);
                const swapContract = new ethers.Contract(targetPool, SWAP_POOL_ABI, signer);
                
                const decimals = await tokenInContract.decimals().catch(() => 6);
                const parsedAmountIn = ethers.parseUnits(amountIn, decimals);

                // 1. Thực hiện lệnh Approve spending cap
                updateLog(`Đang kích hoạt pop-up phê duyệt quyền chi tiêu (Approve) ${fromSymbol}...`);
                let approveTx = await tokenInContract.approve(targetPool, parsedAmountIn);
                updateLog(`Lệnh Approve đang được xử lý on-chain: ${approveTx.hash}`);
                await approveTx.wait();
                updateLog(`Phê duyệt Approve hoàn tất! Đang gọi lệnh thực hiện Swap thực tế...`);

                // 2. Gọi lệnh Swap chính thức (Bổ sung gasLimit ngăn chặn crash âm thầm)
                let tx = await swapContract.swap(fromAddress, toAddress, parsedAmountIn, {
                    gasLimit: 350000 
                });
                
                updateLog("Giao dịch hoán đổi đang được xử lý on-chain: " + tx.hash);
                await tx.wait();

                updateLog(`Hoán đổi hoàn toàn thành công!`);
                alert("Chúc mừng! Hoán đổi token thành công và số dư đã thay đổi.");
                await updateAllBalances(); 
            } catch (err) {
                console.error(err);
                // In chi tiết lỗi ra thanh trạng thái Console phía dưới màn hình
                updateLog("Giao dịch lỗi/bị hủy bỏ: " + (err.reason || err.message));
                alert("Lỗi thực thi: Smart Contract Pool từ chối xử lý hoặc bạn nhập sai địa chỉ Contract Pool.");
            }
        }

        // --- HÀM 2: LIQUIDITY ---
        async function uiAddLiquidity() {
            if (!userAddress) return alert("Vui lòng kết nối ví trước!");
            const amountUSDC = document.getElementById('liquidityUsdcAmount').value;
            const amountEURC = document.getElementById('liquidityEurcAmount').value;
            const targetPool = document.getElementById('liquidityPoolAddress').value.trim();
            if (!targetPool) return alert("Vui lòng điền địa chỉ Liquidity Pool Contract!");
            if (!amountUSDC || !amountEURC) return alert("Vui lòng nhập đầy đủ số lượng!");

            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();

                const usdc = new ethers.Contract(DEPLOYED_CONTRACTS.USDC_TOKEN, ERC20_ABI, signer);
                const eurc = new ethers.Contract(DEPLOYED_CONTRACTS.EURC_TOKEN, ERC20_ABI, signer);
                const swapPool = new ethers.Contract(targetPool, SWAP_POOL_ABI, signer);

                const decUsdc = await usdc.decimals().catch(() => 6);
                const decEurc = await eurc.decimals().catch(() => 6);

                const parsedUSDC = ethers.parseUnits(amountUSDC, decUsdc); 
                const parsedEURC = ethers.parseUnits(amountEURC, decEurc);

                updateLog("Đang Approve USDC...");
                let tx = await usdc.approve(targetPool, parsedUSDC);
                await tx.wait();

                updateLog("Đang Approve EURC...");
                tx = await eurc.approve(targetPool, parsedEURC);
                await tx.wait();

                updateLog("Đang nạp thanh khoản vào Pool...");
                tx = await swapPool.addLiquidity(parsedUSDC, parsedEURC);
                await tx.wait();

                updateLog("Thành công! Đã cung cấp thanh khoản.");
                alert("Nạp thanh khoản thành công!");
                await updateAllBalances();
            } catch (err) {
                updateLog("Lỗi Liquidity: " + err.message);
            }
        }

        // --- HÀM 3: LENDING ---
        async function uiLending() {
            if (!userAddress) return alert("Vui lòng kết nối ví trước!");
            const tokenSymbol = document.getElementById('lendingToken').value;
            const amount = document.getElementById('lendingAmount').value;
            const targetPool = document.getElementById('lendingPoolAddress').value.trim();
            if (!targetPool) return alert("Vui lòng điền địa chỉ Lending Pool Contract!");
            if (!amount) return alert("Vui lòng nhập số lượng!");

            const tokenAddress = tokenSymbol === "USDC" ? DEPLOYED_CONTRACTS.USDC_TOKEN : DEPLOYED_CONTRACTS.EURC_TOKEN;

            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();

                const token = new ethers.Contract(tokenAddress, ERC20_ABI, signer);
                const lending = new ethers.Contract(targetPool, LENDING_POOL_ABI, signer);
                
                const decimals = await token.decimals().catch(() => 6);
                const parsedAmount = ethers.parseUnits(amount, decimals);

                updateLog(`Đang Approve ${tokenSymbol}...`);
                let tx = await token.approve(targetPool, parsedAmount);
                await tx.wait();

                updateLog(`Đang nạp tài sản vào Lending Pool...`);
                tx = await lending.deposit(tokenAddress, parsedAmount);
                await tx.wait();

                updateLog(`Lending thành công ${amount} ${tokenSymbol}!`);
                alert("Lending thành công tài sản vào Pool!");
                await updateAllBalances();
            } catch (err) {
                updateLog("Lỗi Lending: " + err.message);
            }
        }

        // --- HÀM 4: BORROW ---
        async function uiBorrow() {
            if (!userAddress) return alert("Vui lòng kết nối ví trước!");
            const tokenSymbol = document.getElementById('borrowToken').value;
            const amount = document.getElementById('borrowAmount').value;
            const targetPool = document.getElementById('borrowPoolAddress').value.trim();
            if (!targetPool) return alert("Vui lòng điền địa chỉ Borrow Pool Contract!");
            if (!amount) return alert("Vui lòng nhập số lượng vay!");

            const tokenAddress = tokenSymbol === "USDC" ? DEPLOYED_CONTRACTS.USDC_TOKEN : DEPLOYED_CONTRACTS.EURC_TOKEN;

            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();

                const token = new ethers.Contract(tokenAddress, ERC20_ABI, provider);
                const lending = new ethers.Contract(targetPool, LENDING_POOL_ABI, signer);
                
                const decimals = await token.decimals().catch(() => 6);
                const parsedAmount = ethers.parseUnits(amount, decimals);

                updateLog(`Đang xử lý yêu cầu vay ${amount} ${tokenSymbol}...`);
                let tx = await lending.borrow(tokenAddress, parsedAmount);
                await tx.wait();

                updateLog(`Mượn tài sản thành công!`);
                alert("Yêu cầu vay đã hoàn tất!");
                await updateAllBalances();
            } catch (err) {
                updateLog("Lỗi Borrow: " + err.message);
            }
        }

        // --- HÀM 5: CROSS-CHAIN BRIDGE ---
        async function uiBridge() {
            if (!userAddress) return alert("Vui lòng kết nối ví trước!");
            const targetChain = document.getElementById('bridgeTargetChain').value;
            const tokenSymbol = document.getElementById('bridgeToken').value;
            const amount = document.getElementById('bridgeAmount').value;
            const recipient = document.getElementById('bridgeRecipient').value;
            const targetBridge = document.getElementById('bridgeContractAddress').value.trim();

            if (!targetBridge) return alert("Vui lòng điền địa chỉ Bridge Contract!");
            if (!amount || !recipient) return alert("Vui lòng nhập đủ thông tin!");
            const tokenAddress = tokenSymbol === "USDC" ? DEPLOYED_CONTRACTS.USDC_TOKEN : DEPLOYED_CONTRACTS.EURC_TOKEN;
            const targetChainId = targetChain === "Sepolia" ? 11155111 : 84532; 

            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();

                const token = new ethers.Contract(tokenAddress, ERC20_ABI, signer);
                const bridge = new ethers.Contract(targetBridge, BRIDGE_ABI, signer);
                
                const decimals = await token.decimals().catch(() => 6);
                const parsedAmount = ethers.parseUnits(amount, decimals);

                updateLog(`Đang Approve tài sản ${tokenSymbol}...`);
                let tx = await token.approve(targetBridge, parsedAmount);
                await tx.wait();

                updateLog(`Đang kích hoạt cầu nối sang mạng ${targetChain}...`);
                tx = await bridge.bridgeAsset(
                    targetChainId, 
                    tokenAddress, 
                    parsedAmount, 
                    recipient, 
                    { value: ethers.parseEther("0.001") }
                );
                await tx.wait();

                updateLog(`Giao dịch bridge thành công!`);
                alert("Đã gửi tài sản qua cầu nối thành công!");
                await updateAllBalances();
            } catch (err) {
                updateLog("Lỗi Bridge: " + err.message);
            }
        }
    </script>
</body>
