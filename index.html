<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MULTI-DEFI-HUB</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.11.1/ethers.umd.min.js"></script>
    <style>
        :root {
            --bg-color: #0b111e;
            --card-bg: #111827;
            --primary-color: #1d4ed8;
            --primary-hover: #2563eb;
            --text-color: #ffffff;
            --text-muted: #9ca3af;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid #1f2937;
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #3b82f6;
        }
        .wallet-zone {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-connect {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-disconnect {
            background-color: var(--danger);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }
        .btn-faucet {
            background-color: #a855f7;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .tab-btn {
            background-color: #1f2937;
            color: var(--text-muted);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .input-group {
            margin-bottom: 15px;
            position: relative;
        }
        .input-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            color: var(--text-muted);
            font-size: 14px;
        }
        .balance-label {
            color: #3b82f6;
            font-weight: 500;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #374151;
            background-color: #1f2937;
            color: white;
            box-sizing: border-box;
            font-size: 15px;
        }
        .btn-action {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-action:hover {
            background-color: var(--primary-hover);
        }
        .status-box {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            background-color: #1f2937;
            font-size: 13px;
            word-break: break-all;
            color: #60a5fa;
            border-left: 4px solid #3b82f6;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">MULTI-DEFI-HUB</div>
        <div class="wallet-zone">
            <button class="btn-faucet" onclick="window.open('https://testnet.arcscan.app', '_blank')">🎁 Faucet USDC / EURC</button>
            <button class="btn-connect" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
            <button class="btn-disconnect" id="disconnectBtn" onclick="disconnectWallet()">Disconnect</button>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'swap-tab')">Swap</button>
        <button class="tab-btn" onclick="switchTab(event, 'liquidity-tab')">Liquidity</button>
        <button class="tab-btn" onclick="switchTab(event, 'lending-tab')">Lending</button>
        <button class="tab-btn" onclick="switchTab(event, 'borrow-tab')">Borrow</button>
        <button class="tab-btn" onclick="switchTab(event, 'bridge-tab')">Bridge</button>
    </div>

    <div class="container">
        <div id="swap-tab" class="tab-content active">
            <div class="input-group">
                <label>Từ Token</label>
                <select id="swapFromToken" onchange="handleSwapFromChange()">
                    <option value="USDC">USDC</option>
                    <option value="EURC" selected>EURC</option>
                </select>
            </div>
            <div class="input-group">
                <label>
                    <span>Số lượng bán</span>
                    <span class="balance-label">Ví: <span id="balance-swap">0.0000</span></span>
                </label>
                <input type="number" id="swapAmountIn" placeholder="0.0" value="2" step="any">
            </div>
            <div class="input-group">
                <label>Đến Token</label>
                <select id="swapToToken" onchange="handleSwapToChange()">
                    <option value="EURC">EURC</option>
                    <option value="USDC" selected>USDC</option>
                </select>
            </div>
            <button class="btn-action" onclick="uiSwap()">Xác Nhận Swap</button>
        </div>

        <div id="liquidity-tab" class="tab-content">
            <h3>Liquidity Pool</h3>
            <div class="input-group">
                <label>
                    <span>Số lượng USDC nạp</span>
                    <span class="balance-label">Ví: <span id="balance-liq-usdc">0.0000</span></span>
                </label>
                <input type="number" id="liquidityUsdcAmount" placeholder="0.0" step="any">
            </div>
            <div class="input-group">
                <label>
                    <span>Số lượng EURC nạp</span>
                    <span class="balance-label">Ví: <span id="balance-liq-eurc">0.0000</span></span>
                </label>
                <input type="number" id="liquidityEurcAmount" placeholder="0.0" step="any">
            </div>
            
            <button class="btn-action" style="background-color: #4b5563; margin-bottom: 8px;" onclick="approveUSDC()">Approve USDC</button>
            <button class="btn-action" style="background-color: #4b5563; margin-bottom: 8px;" onclick="approveEURC()">Approve EURC</button>
            <button class="btn-action" style="background-color: #10b981;" onclick="executeAddLiquidity()">Xác Nhận Thêm Thanh Khoản</button>
        </div>

        <div id="lending-tab" class="tab-content">
            <h3>Lending Pool</h3>
            <div class="input-group">
                <label>Chọn tài sản gửi</label>
                <select id="lendingToken" onchange="updateAllBalances()">
                    <option value="USDC">USDC</option>
                    <option value="EURC">EURC</option>
                </select>
            </div>
            <div class="input-group">
                <label>
                    <span>Số lượng muốn gửi</span>
                    <span class="balance-label">Ví: <span id="balance-lending">0.0000</span></span>
                </label>
                <input type="number" id="lendingAmount" placeholder="0.0" step="any">
            </div>
            
            <button class="btn-action" style="background-color: #4b5563; margin-bottom: 8px;" onclick="approveLending()">Approve Token</button>
            <button class="btn-action" style="background-color: #10b981;" onclick="executeLendingDeposit()">Xác Nhận Gửi (Deposit)</button>
        </div>

        <div id="borrow-tab" class="tab-content">
            <h3>Borrow (Vay)</h3>
            <div class="input-group">
                <label>Chọn tài sản vay</label>
                <select id="borrowToken" onchange="updateAllBalances()">
                    <option value="USDC">USDC</option>
                    <option value="EURC">EURC</option>
                </select>
            </div>
            <div class="input-group">
                <label>
                    <span>Số lượng vay</span>
                    <span class="balance-label">Ví: <span id="balance-borrow">0.0000</span></span>
                </label>
                <input type="number" id="borrowAmount" placeholder="0.0" step="any">
            </div>
            <button class="btn-action" onclick="uiBorrow()">Xác Nhận Vay</button>
        </div>

        <div id="bridge-tab" class="tab-content">
            <h3>Cross-Chain Bridge</h3>
            <div class="input-group">
                <label>Chuỗi đích chuyển đến</label>
                <select id="bridgeTargetChain">
                    <option value="1">Sepolia Testnet</option>
                    <option value="2">Base Testnet</option>
                </select>
            </div>
            <div class="input-group">
                <label>Chọn Token</label>
                <select id="bridgeToken" onchange="updateAllBalances()">
                    <option value="USDC">USDC</option>
                    <option value="EURC">EURC</option>
                </select>
            </div>
            <div class="input-group">
                <label>
                    <span>Số lượng chuyển</span>
                    <span class="balance-label">Ví: <span id="balance-bridge">0.0000</span></span>
                </label>
                <input type="number" id="bridgeAmount" placeholder="0.0" step="any">
            </div>
            <div class="input-group">
                <label>Ví nhận ở mạng đích</label>
                <input type="text" id="bridgeRecipient" placeholder="0x...">
            </div>
            
            <button class="btn-action" style="background-color: #4b5563; margin-bottom: 8px;" onclick="approveBridge()">Approve Bridge Token</button>
            <button class="btn-action" style="background-color: #10b981;" onclick="executeBridge()">Xác Nhận Kích Hoạt Cầu Nối</button>
        </div>

        <div class="status-box" id="statusConsole">Hệ thống: Sẵn sàng kết nối ví Arc Network.</div>
    </div>

    <script>
        // ĐÃ ĐỒNG BỘ CHÍNH XÁC ĐỊA CHỈ CONTRACT THEO YÊU CẦU CỦA BẠN
        const RAW_CONTRACTS = {
            USDC_TOKEN: "0x3600000000000000000000000000000000000000", 
            EURC_TOKEN: "0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a", 
            SWAP_POOL_ROUTER: "0x8D02E191dDa6da9a2F8De7bd46caF795D3e3Bc9c", 
            BRIDGE_CONTRACT: "0xfdB761CDB47093cEe833b8f20C6aDe50e5FbbC02",
            LENDING_POOL: "0x398E4b2A5d5F534e1bfe64DC515DCf829620cFf5"
        };

        function getSafeAddress(addr) {
            if (!addr) return ethers.ZeroAddress;
            return ethers.getAddress(addr.trim().toLowerCase());
        }

        const ERC20_ABI = [
            "function approve(address spender, uint256 amount) public returns (bool)",
            "function allowance(address owner, address spender) public view returns (uint256)",
            "function balanceOf(address account) public view returns (uint256)",
            "function transfer(address recipient, uint256 amount) public returns (bool)"
        ];

        const SWAP_POOL_ABI = [
            "function trade(address _tokenAddress, uint256 _amountIn) external", 
            "function addLiquidity(uint256 _amountUSDC, uint256 _amountEURC) external"
        ];

        const BRIDGE_ABI = [
            "function bridgeAsset(uint256 _targetChainId, address _token, uint256 _amount, address _recipient) external"
        ];

        const LENDING_POOL_ABI = [
            "function deposit(address token, uint256 amount) external",
            "function borrow(address token, uint256 amount) external"
        ];

        let userAddress = null;

        function updateLog(msg) {
            document.getElementById('statusConsole').innerText = "Log: " + msg;
            console.log(msg);
        }

        function switchTab(e, tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            e.currentTarget.classList.add('active');
            updateAllBalances();
        }

        async function handleSwapFromChange() {
            const fromToken = document.getElementById('swapFromToken').value;
            document.getElementById('swapToToken').value = fromToken === "USDC" ? "EURC" : "USDC";
            await updateAllBalances();
        }

        async function handleSwapToChange() {
            const toToken = document.getElementById('swapToToken').value;
            document.getElementById('swapFromToken').value = toToken === "USDC" ? "EURC" : "USDC";
            await updateAllBalances();
        }

        async function getTokenBalance(tokenAddress, account) {
            try {
                if(!window.ethereum || !account) return "0.0000";
                const provider = new ethers.BrowserProvider(window.ethereum);
                const contract = new ethers.Contract(getSafeAddress(tokenAddress), ERC20_ABI, provider);
                const balance = await contract.balanceOf(getSafeAddress(account));
                return ethers.formatUnits(balance, 6);
            } catch (err) {
                console.error("Lỗi RPC balanceOf:", err);
                return "0.0000";
            }
        }

        async function updateAllBalances() {
            if (!userAddress || !window.ethereum) return;
            try {
                const swapFrom = document.getElementById('swapFromToken').value;
                const swapTokenAddress = swapFrom === "USDC" ? RAW_CONTRACTS.USDC_TOKEN : RAW_CONTRACTS.EURC_TOKEN;
                const balanceSwapRaw = await getTokenBalance(swapTokenAddress, userAddress);
                document.getElementById('balance-swap').innerText = parseFloat(balanceSwapRaw).toFixed(4);

                const balLiqUsdc = await getTokenBalance(RAW_CONTRACTS.USDC_TOKEN, userAddress);
                const balLiqEurc = await getTokenBalance(RAW_CONTRACTS.EURC_TOKEN, userAddress);
                document.getElementById('balance-liq-usdc').innerText = parseFloat(balLiqUsdc).toFixed(4);
                document.getElementById('balance-liq-eurc').innerText = parseFloat(balLiqEurc).toFixed(4);

                const lendToken = document.getElementById('lendingToken').value;
                const lendTokenAddress = lendToken === "USDC" ? RAW_CONTRACTS.USDC_TOKEN : RAW_CONTRACTS.EURC_TOKEN;
                const balLend = await getTokenBalance(lendTokenAddress, userAddress);
                document.getElementById('balance-lending').innerText = parseFloat(balLend).toFixed(4);

                const borrowToken = document.getElementById('borrowToken').value;
                const borrowTokenAddress = borrowToken === "USDC" ? RAW_CONTRACTS.USDC_TOKEN : RAW_CONTRACTS.EURC_TOKEN;
                const balBorrow = await getTokenBalance(borrowTokenAddress, userAddress);
                document.getElementById('balance-borrow').innerText = parseFloat(balBorrow).toFixed(4);

                const bridgeToken = document.getElementById('bridgeToken').value;
                const bridgeTokenAddress = bridgeToken === "USDC" ? RAW_CONTRACTS.USDC_TOKEN : RAW_CONTRACTS.EURC_TOKEN;
                const balBridge = await getTokenBalance(bridgeTokenAddress, userAddress);
                document.getElementById('balance-bridge').innerText = parseFloat(balBridge).toFixed(4);
            } catch (error) {
                console.error("Lỗi cập nhật số dư:", error);
            }
        }

        async function connectWallet() {
            if (!window.ethereum) return alert("Vui lòng cài đặt MetaMask!");
            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                userAddress = accounts[0];
                document.getElementById('connectBtn').innerText = userAddress.substring(0, 6) + "..." + userAddress.substring(38);
                document.getElementById('disconnectBtn').style.display = "inline-block";
                updateLog("Đã kết nối ví: " + userAddress);
                await updateAllBalances();
            } catch (err) {
                updateLog("Lỗi kết nối ví: " + err.message);
            }
        }

        function disconnectWallet() {
            userAddress = null;
            document.getElementById('connectBtn').innerText = "Connect Wallet";
            document.getElementById('disconnectBtn').style.display = "none";
            updateLog("Đã ngắt kết nối ví.");
        }

        async function getLegacyGasParam(provider) {
            try {
                const feeData = await provider.getFeeData();
                let targetGasPrice = feeData.gasPrice ? (feeData.gasPrice * 200n) / 100n : ethers.parseUnits("25", "gwei");
                return { gasPrice: targetGasPrice };
            } catch (e) {
                return { gasPrice: ethers.parseUnits("25", "gwei") };
            }
        }

        async function uiSwap() {
            if (!userAddress || !window.ethereum) return alert("Vui lòng kết nối ví trước!");
            const fromSymbol = document.getElementById('swapFromToken').value;
            const toSymbol = document.getElementById('swapToToken').value;
            const amountIn = document.getElementById('swapAmountIn').value;
            
            const targetRouter = getSafeAddress(RAW_CONTRACTS.SWAP_POOL_ROUTER);

            if (fromSymbol === toSymbol) return alert("Token nguồn và đích phải khác nhau!");
            if (!amountIn || parseFloat(amountIn) <= 0) return alert("Vui lòng nhập số lượng hợp lệ!");

            const fromAddress = getSafeAddress(fromSymbol === "USDC" ? RAW_CONTRACTS.USDC_TOKEN : RAW_CONTRACTS.EURC_TOKEN);

            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();

                const tokenInContract = new ethers.Contract(fromAddress, ERC20_ABI, signer);
                const swapContract = new ethers.Contract(targetRouter, SWAP_POOL_ABI, signer);
                
                const parsedAmountIn = ethers.parseUnits(amountIn.toString(), 6);

                updateLog(`Đang kiểm tra quyền hạn (allowance) của ${fromSymbol}...`);
                const allowance = await tokenInContract.allowance(getSafeAddress(userAddress), targetRouter);
                
                const gasParams = await getLegacyGasParam(provider);

                if (BigInt(allowance) < BigInt(parsedAmountIn)) {
                    updateLog(`Hạn mức chưa đủ. Đang gửi yêu cầu Approve ${fromSymbol}...`);
                    let approveTx = await tokenInContract.approve(targetRouter, parsedAmountIn, { 
                        gasLimit: 80000,
                        ...gasParams 
                    });
                    await approveTx.wait();
                    updateLog(`Approve thành công!`);
                }
                
                updateLog(`Đang tiến hành gọi trade()...`);
                let tx = await swapContract.trade(fromAddress, parsedAmountIn, {
                    gasLimit: 280000,
                    ...gasParams
                });
                await tx.wait();

                updateLog(`Hoán đổi thành công!`);
                alert("Hoán đổi thành công!");
                await updateAllBalances();
            } catch (err) {
                updateLog("Giao dịch lỗi: " + (err.reason || err.message));
                alert("Lỗi giao dịch!");
            }
        }

        async function approveUSDC() {
            if (!userAddress || !window.ethereum) return alert("Vui lòng kết nối ví!");
            const amountUSDC = document.getElementById('liquidityUsdcAmount').value;
            if(!amountUSDC || parseFloat(amountUSDC) <= 0) return alert("Vui lòng nhập số lượng USDC hợp lệ!");
            const targetPool = getSafeAddress(RAW_CONTRACTS.SWAP_POOL_ROUTER);
            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                const usdc = new ethers.Contract(getSafeAddress(RAW_CONTRACTS.USDC_TOKEN), ERC20_ABI, signer);
                const gasParams = await getLegacyGasParam(provider);
                
                updateLog("Đang Approve USDC...");
                let tx = await usdc.approve(targetPool, ethers.parseUnits(amountUSDC.toString(), 6), { gasLimit: 80000, ...gasParams });
                await tx.wait();
                updateLog("Approve USDC thành công!");
            } catch (err) { 
                updateLog("Lỗi Approve USDC: " + (err.reason || err.message)); 
            }
        }

        async function approveEURC() {
            if (!userAddress || !window.ethereum) return alert("Vui lòng kết nối ví!");
            const amountEURC = document.getElementById('liquidityEurcAmount').value;
            if(!amountEURC || parseFloat(amountEURC) <= 0) return alert("Vui lòng nhập số lượng EURC hợp lệ!");
            const targetPool = getSafeAddress(RAW_CONTRACTS.SWAP_POOL_ROUTER);
            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                const eurc = new ethers.Contract(getSafeAddress(RAW_CONTRACTS.EURC_TOKEN), ERC20_ABI, signer);
                const gasParams = await getLegacyGasParam(provider);

                updateLog("Đang Approve EURC...");
                let tx = await eurc.approve(targetPool, ethers.parseUnits(amountEURC.toString(), 6), { gasLimit: 80000, ...gasParams });
                await tx.wait();
                updateLog("Approve EURC thành công!");
            } catch (err) { 
                updateLog("Lỗi Approve EURC: " + (err.reason || err.message)); 
            }
        }

        async function executeAddLiquidity() {
            if (!userAddress || !window.ethereum) return alert("Vui lòng kết nối ví!");
            const amountUSDC = document.getElementById('liquidityUsdcAmount').value;
            const amountEURC = document.getElementById('liquidityEurcAmount').value;
            const targetPool = getSafeAddress(RAW_CONTRACTS.SWAP_POOL_ROUTER);
            if(!amountUSDC || parseFloat(amountUSDC) <= 0 || !amountEURC || parseFloat(amountEURC) <= 0) {
                return alert("Vui lòng kiểm tra lại số lượng!");
            }
            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                const swapPool = new ethers.Contract(targetPool, SWAP_POOL_ABI, signer);
                const gasParams = await getLegacyGasParam(provider);

                updateLog("Đang tiến hành gửi lệnh addLiquidity()...");
                let tx = await swapPool.addLiquidity(
                    ethers.parseUnits(amountUSDC.toString(), 6), 
                    ethers.parseUnits(amountEURC.toString(), 6),
                    { gasLimit: 380000, ...gasParams }
                );
                await tx.wait();
                updateLog("Nạp thanh khoản thành công!");
                alert("Nạp thanh khoản thành công!");
                await updateAllBalances();
            } catch (err) { 
                updateLog("Lỗi addLiquidity: " + (err.reason || err.message));
            }
        }

        async function approveLending() {
            if (!userAddress || !window.ethereum) return alert("Vui lòng kết nối ví trước!");
            const tokenSymbol = document.getElementById('lendingToken').value;
            const amount = document.getElementById('lendingAmount').value;
            if (!amount || parseFloat(amount) <= 0) return alert("Vui lòng nhập số lượng hợp lệ!");
            
            const targetPool = getSafeAddress(RAW_CONTRACTS.LENDING_POOL);
            const tokenAddress = getSafeAddress(tokenSymbol === "USDC" ? RAW_CONTRACTS.USDC_TOKEN : RAW_CONTRACTS.EURC_TOKEN);

            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                const token = new ethers.Contract(tokenAddress, ERC20_ABI, signer);
                const gasParams = await getLegacyGasParam(provider);
                
                updateLog(`Đang Approve ${tokenSymbol} cho Lending Pool mới...`);
                let tx = await token.approve(targetPool, ethers.parseUnits(amount.toString(), 6), { gasLimit: 80000, ...gasParams });
                await tx.wait();
                updateLog(`Approve ${tokenSymbol} thành công!`);
            } catch (err) {
                updateLog("Lỗi Approve Lending: " + (err.reason || err.message));
            }
        }

        async function executeLendingDeposit() {
            if (!userAddress || !window.ethereum) return alert("Vui lòng kết nối ví trước!");
            const tokenSymbol = document.getElementById('lendingToken').value;
            const amount = document.getElementById('lendingAmount').value;
            if (!amount || parseFloat(amount) <= 0) return alert("Vui lòng nhập số lượng hợp lệ!");
            
            const targetPool = getSafeAddress(RAW_CONTRACTS.LENDING_POOL);
            const tokenAddress = getSafeAddress(tokenSymbol === "USDC" ? RAW_CONTRACTS.USDC_TOKEN : RAW_CONTRACTS.EURC_TOKEN);

            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                const lending = new ethers.Contract(targetPool, LENDING_POOL_ABI, signer);
                const gasParams = await getLegacyGasParam(provider);
                
                updateLog("Đang tiến hành gọi deposit() trừ tiền thật...");
                let tx = await lending.deposit(tokenAddress, ethers.parseUnits(amount.toString(), 6), { gasLimit: 280000, ...gasParams });
                await tx.wait();
                updateLog(`Lending thành công! Ví đã bị khấu trừ tài sản.`);
                alert("Gửi tài sản vào Lending Pool thành công!");
                await updateAllBalances();
            } catch (err) {
                updateLog("Lỗi deposit Lending: " + (err.reason || err.message));
            }
        }

        async function uiBorrow() {
            if (!userAddress || !window.ethereum) return alert("Vui lòng kết nối ví trước!");
            const tokenSymbol = document.getElementById('borrowToken').value;
            const amount = document.getElementById('borrowAmount').value;
            const targetPool = getSafeAddress(RAW_CONTRACTS.LENDING_POOL);
            const tokenAddress = getSafeAddress(tokenSymbol === "USDC" ? RAW_CONTRACTS.USDC_TOKEN : RAW_CONTRACTS.EURC_TOKEN);

            if (!amount || parseFloat(amount) <= 0) return alert("Vui lòng nhập số lượng vay hợp lệ!");

            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                const lending = new ethers.Contract(targetPool, LENDING_POOL_ABI, signer);
                const gasParams = await getLegacyGasParam(provider);

                updateLog(`Đang gửi lệnh vay borrow() giải ngân về ví...`);
                let tx = await lending.borrow(tokenAddress, ethers.parseUnits(amount.toString(), 6), { gasLimit: 280000, ...gasParams });
                await tx.wait();
                updateLog(`Vay thành công! Số dư ví của bạn đã được cộng thêm.`);
                alert("Vay tài sản thành công (Đã nhận tiền về ví)!");
                await updateAllBalances();
            } catch (err) { 
                updateLog("Lỗi Vay (Borrow): " + (err.reason || err.message));
            }
        }

        async function approveBridge() {
            if (!userAddress || !window.ethereum) return alert("Vui lòng kết nối ví trước!");
            const tokenSymbol = document.getElementById('bridgeToken').value;
            const amount = document.getElementById('bridgeAmount').value;
            if (!amount || parseFloat(amount) <= 0) return alert("Vui lòng nhập số lượng chuyển hợp lệ!");
            
            const targetBridge = getSafeAddress(RAW_CONTRACTS.BRIDGE_CONTRACT);
            const tokenAddress = getSafeAddress(tokenSymbol === "USDC" ? RAW_CONTRACTS.USDC_TOKEN : RAW_CONTRACTS.EURC_TOKEN);

            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                const token = new ethers.Contract(tokenAddress, ERC20_ABI, signer);
                const gasParams = await getLegacyGasParam(provider);

                updateLog(`Đang duyệt hạn mức (Approve) cho Cầu Nối mới...`);
                let tx = await token.approve(targetBridge, ethers.parseUnits(amount.toString(), 6), { gasLimit: 80000, ...gasParams });
                await tx.wait();
                updateLog(`Approve thành công! Bạn có thể kích hoạt cầu nối.`);
            } catch (err) {
                updateLog("Lỗi Approve Bridge: " + (err.reason || err.message));
            }
        }

        async function executeBridge() {
            if (!userAddress || !window.ethereum) return alert("Vui lòng kết nối ví trước!");
            const targetChainId = document.getElementById('bridgeTargetChain').value;
            const tokenSymbol = document.getElementById('bridgeToken').value;
            const amount = document.getElementById('bridgeAmount').value;
            const recipient = document.getElementById('bridgeRecipient').value;
            
            const targetBridge = getSafeAddress(RAW_CONTRACTS.BRIDGE_CONTRACT);
            const tokenAddress = getSafeAddress(tokenSymbol === "USDC" ? RAW_CONTRACTS.USDC_TOKEN : RAW_CONTRACTS.EURC_TOKEN);

            if (!amount || parseFloat(amount) <= 0) return alert("Số lượng không hợp lệ!");
            if (!recipient || !recipient.trim().startsWith("0x")) return alert("Địa chỉ ví nhận mạng đích sai định dạng!");

            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                const bridgeContract = new ethers.Contract(targetBridge, BRIDGE_ABI, signer);
                const gasParams = await getLegacyGasParam(provider);

                updateLog(`Đang thực hiện gọi hàm bridgeAsset() trên contract mới...`);
                let tx = await bridgeContract.bridgeAsset(
                    BigInt(targetChainId),
                    tokenAddress,
                    ethers.parseUnits(amount.toString(), 6),
                    getSafeAddress(recipient),
                    { gasLimit: 280000, ...gasParams }
                );
                await tx.wait();
                
                updateLog("Khóa tài sản và kích hoạt Bridge thành công!");
                alert("Kích hoạt lệnh Bridge chuỗi chéo thành công!");
                await updateAllBalances();
            } catch (err) {
                updateLog("Lỗi Bridge: " + (err.reason || err.message));
                alert("Lỗi: " + (err.reason || err.message));
            }
        }
    </script>
</body>
</html>
